

<!DOCTYPE html>
<html lang="sv">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Level Up Life</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
 
<body>
    <div class="particle-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
 
    <div class="level-badge">
        <span class="level-number">LVL 1</span>
        <div class="xp-bar">
            <div class="xp-progress"></div>
        </div>
    </div>
 
    <header>
        <div class="header-glow"></div>
        <h1>
            <span class="title-main">Dashboard</span>
        </h1>
        <p class="tagline">Monitor Your Growth & Stats</p>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html" class="nav-active">Dashboard</a></li>
                <li><a href="quests.html">Quests</a></li>
                <li><a href="progress.html">Progress</a></li>
            </ul>
        </nav>
    </header>
 
    <main>
        <!-- Current Level Overview -->
        <section id="level-overview" class="hero-section">
            <div class="hero-content">
                <h2 class="hero-title">Level 1 Hunter</h2>
                <p class="hero-description">
                    Du har börjat din resa som E-Rank Hunter. Complete quests och samla XP för att rank up och unlock new abilities.
                </p>
                <div class="hero-stats">
                    <div class="stat-pill">
                        <span class="stat-icon">📊</span>
                        <span class="stat-label">Total XP: 850</span>
                    </div>
                    <div class="stat-pill">
                        <span class="stat-icon">🔥</span>
                        <span class="stat-label">Streak: 7 days</span>
                    </div>
                    <div class="stat-pill">
                        <span class="stat-icon">🏆</span>
                        <span class="stat-label">Rank: E</span>
                    </div>
                </div>
            </div>
            <div class="hero-image">
                <div class="character-silhouette"></div>
            </div>
        </section>
